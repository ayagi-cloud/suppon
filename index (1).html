<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>すっぽんチーム 招待管理</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #aaaaaa;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #0F6E56;
    --amber: #BA7517; --amber-light: #FAEEDA; --amber-dark: #633806;
    --red-light: #FCEBEB; --red-dark: #791F1F;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333330;
      --text: #f0ede8; --text2: #9a9890; --text3: #666666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-light: #04342C; --green-dark: #9FE1CB;
      --amber-light: #412402; --amber-dark: #FAC775;
      --red-light: #501313; --red-dark: #F09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
  .page-title { font-size: 20px; font-weight: 500; }
  .deadline-badge { font-size: 13px; color: var(--text2); background: var(--bg); padding: 5px 14px; border-radius: var(--radius); border: 0.5px solid var(--border); display: flex; align-items: center; gap: 6px; }
  .days-pill { font-size: 12px; padding: 2px 8px; border-radius: var(--radius); background: var(--amber-light); color: var(--amber-dark); }
  .sync-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); margin-bottom: 1.25rem; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .dot.saving { background: var(--amber); animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 1rem; }
  .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .metric-value { font-size: 28px; font-weight: 500; }
  .metric-value.green { color: var(--green); }
  .metric-value.amber { color: var(--amber); }
  .progress-bg { height: 10px; background: var(--bg2); border-radius: 99px; overflow: hidden; border: 0.5px solid var(--border); }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.5s ease; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-top: 6px; margin-bottom: 1.5rem; }
  .section-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  .add-form { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 1.5rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-field label { font-size: 12px; color: var(--text2); }
  .form-field input, .form-field select { font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); height: 36px; outline: none; }
  .form-field input:focus, .form-field select:focus { border-color: var(--green); }
  .conf-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .conf-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .conf-btn { font-size: 12px; padding: 6px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: none; cursor: pointer; color: var(--text2); transition: all 0.15s; }
  .conf-btn:hover { background: var(--bg2); }
  .conf-btn.active-high { background: var(--green-light); color: var(--green-dark); border-color: #5DCAA5; }
  .conf-btn.active-mid { background: var(--amber-light); color: var(--amber-dark); border-color: #EF9F27; }
  .conf-btn.active-low { background: var(--red-light); color: var(--red-dark); border-color: #F09595; }
  .submit-btn { font-size: 13px; padding: 8px 20px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: none; cursor: pointer; color: var(--text); transition: background 0.15s; }
  .submit-btn:hover { background: var(--bg2); }
  .log-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .log-header { padding: 10px 16px; background: var(--bg2); font-size: 13px; font-weight: 500; }
  .log-item { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-top: 0.5px solid var(--border); font-size: 13px; color: var(--text2); flex-wrap: wrap; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: #EEEDFE; color: #534AB7; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .log-name { font-weight: 500; color: var(--text); }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: var(--radius); flex-shrink: 0; }
  .conf-high { background: var(--green-light); color: var(--green-dark); }
  .conf-mid  { background: var(--amber-light); color: var(--amber-dark); }
  .conf-low  { background: var(--red-light); color: var(--red-dark); }
  .month-badge { font-size: 11px; padding: 2px 8px; border-radius: var(--radius); background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); flex-shrink: 0; }
  .log-date { font-size: 11px; color: var(--text3); margin-left: auto; margin-right: 4px; flex-shrink: 0; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; line-height: 1; padding: 2px; transition: color 0.15s; }
  .del-btn:hover { color: #E24B4A; }
  .empty-log { padding: 14px 16px; font-size: 13px; color: var(--text3); }
</style>
</head>
<body>
<div class="container">
  <div class="top">
    <h1 class="page-title">🐢 すっぽんチーム 招待管理</h1>
    <div class="deadline-badge">
      📅 締切：6/11
      <span class="days-pill" id="days-badge"></span>
    </div>
  </div>
  <div class="sync-bar">
    <span class="dot saving" id="sync-dot"></span>
    <span id="sync-status">読み込み中…</span>
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-label">招待済み</div><div class="metric-value green" id="cnt-total">–</div></div>
    <div class="metric"><div class="metric-label">高確度</div><div class="metric-value green" id="cnt-high">–</div></div>
    <div class="metric"><div class="metric-label">残り</div><div class="metric-value amber" id="cnt-rem">–</div></div>
  </div>
  <div class="progress-bg"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-labels"><span id="prog-text">– / 12 人</span><span id="prog-pct">–%</span></div>
  <div class="section-title">招待者を追加（えりこ）</div>
  <div class="add-form">
    <div class="form-grid">
      <div class="form-field"><label>氏名</label><input type="text" id="f-name" placeholder="例：山田 太郎"></div>
      <div class="form-field">
        <label>受講希望月</label>
        <select id="f-month">
          <option value="">未定</option>
          <option value="6月">6月</option><option value="7月">7月</option>
          <option value="8月">8月</option><option value="9月">9月</option>
          <option value="10月">10月</option><option value="11月">11月</option>
          <option value="12月">12月</option>
        </select>
